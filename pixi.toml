[workspace]
name = "pymeria"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.11,<3.13"
numpy = "*"
pillow = "*"
click = "*"
requests = "*"
tqdm = "*"
pymomentum = ">=0.1.33"

[pypi-dependencies]
loguru = "*"
projectaria-tools = ">=1.5.5"
nymeria = { path = ".", editable = true }
# Optional body models — comment out if not needed
smplx = "*"
scipy = "*"  # required by smplx
mhr = "*"

[tasks]
view = "python viewer.py"
download = "python download.py"
